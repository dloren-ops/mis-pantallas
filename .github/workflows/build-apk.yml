name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        # versionCode = numero de ejecucion del workflow (siempre creciente).
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Prepare APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk \
             "out/mis-pantallas-v1.0.${{ github.run_number }}.apk"

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Mis Pantallas v1.0.${{ github.run_number }}
          body: |
            Build automática (versionCode ${{ github.run_number }}).
            Descargá e instalá el APK desde la propia app con "Buscar actualizaciones".
          files: out/mis-pantallas-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
